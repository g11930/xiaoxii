<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大西</title>
<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: "Microsoft YaHei", sans-serif;
}
html, body {
    height: 100%;
    overflow: hidden;
}

/* 登录面板 */
.login {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #f5f7fa;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}
.login .card {
    background: #fff;
    padding: 40px;
    border-radius: 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    width: 100%;
    max-width: 380px;
}
.login h2 {
    text-align: center;
    margin-bottom: 24px;
}
.login input {
    width: 100%;
    height: 44px;
    margin-bottom: 16px;
    border: 1px solid #ddd;
    border-radius: 8px;
    padding: 0 14px;
    font-size: 14px;
}
.login button {
    width: 100%;
    height: 44px;
    background: #07c160;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
}

/* 主布局 */
.main {
    display: flex;
    height: 100%;
}

/* 侧边栏（数据员功能栏） */
.sidebar {
    width: 180px;
    background: #2b3445;
    color: #fff;
    padding: 16px;
    transition: width 0.3s ease, overflow 0.3s ease;
    overflow: hidden;
}
.sidebar.collapse {
    width: 60px;
}
.sidebar .title {
    text-align: center;
    margin-bottom: 20px;
    font-size: 16px;
    font-weight: bold;
    transition: opacity 0.3s ease;
}
.sidebar.collapse .title {
    opacity: 0;
    width: 0;
    overflow: hidden;
}
.menu-btn {
    display: block;
    width: 100%;
    padding: 12px 10px;
    margin-bottom: 8px;
    background: #3c4658;
    color: #fff;
    border: none;
    border-radius: 6px;
    text-align: center;
    cursor: pointer;
    font-size: 14px;
    transition: background 0.2s;
}
.menu-btn:hover {
    background: #4b576e;
}
.menu-btn.active {
    background: #4299e1;
}
/* 退出按钮样式 */
.logout-btn {
    background: #e53e3e;
    margin-top: 20px;
}
.logout-btn:hover {
    background: #c53030;
}

/* 侧边栏切换按钮 */
.toggle-btn {
    position: absolute;
    left: 180px;
    top: 20px;
    width: 20px;
    height: 40px;
    line-height: 40px;
    text-align: center;
    background: #2b3445;
    color: #fff;
    border-top-right-radius: 4px;
    border-bottom-right-radius: 4px;
    cursor: pointer;
    transition: left 0.3s ease;
    z-index: 10;
}
.sidebar.collapse + .toggle-btn {
    left: 60px;
}
.toggle-btn:hover {
    background: #4299e1;
}

/* 右侧内容区 */
.content {
    flex: 1;
    display: flex;
    flex-direction: column;
    background: #edf2f7;
    position: relative;
}
.tabs {
    display: flex;
    background: #fff;
    border-bottom: 1px solid #e2e8f0;
    overflow-x: auto;
    white-space: nowrap;
}
.tab {
    padding: 12px 18px;
    cursor: pointer;
    border-right: 1px solid #e2e8f0;
    position: relative;
    background: #f7fafc;
    font-size: 14px;
}
.tab.active {
    background: #fff;
    font-weight: bold;
}
.tab .close {
    margin-left: 8px;
    color: #999;
    font-size: 12px;
    padding: 2px 4px;
    border-radius: 2px;
}
.tab .close:hover {
    background: #e53e3e;
    color: #fff;
}
.pages {
    flex: 1;
    position: relative;
    overflow: hidden;
}
.page {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #fff;
    display: none;
}
.page.active {
    display: block;
}
.page iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
}

/* 插图功能样式 */
#illustration-page {
    padding: 20px;
    overflow-y: auto;
}
.drop-area {
    border: 2px dashed #ccc;
    border-radius: 8px;
    padding: 40px 20px;
    text-align: center;
    margin-bottom: 20px;
    cursor: pointer;
    transition: border-color 0.2s;
}
.drop-area.dragover {
    border-color: #4299e1;
    background: #f0f8ff;
}
.no-preview {
    color: #999;
    text-align: center;
    padding: 40px 0;
    font-size: 14px;
}
.file-name-label {
    padding: 4px 0;
    font-size: 12px;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
}
#preview-table {
    border-collapse: collapse;
    margin: 10px 0;
    width: 100%;
    overflow-x: auto;
    display: block;
}
#preview-table td {
    border: 1px solid #ddd;
    padding: 0;
    text-align: center;
}
.tip {
    margin: 10px 0;
    font-size: 12px;
    color: #666;
}
.config-group {
    margin-bottom: 15px;
    padding: 10px;
    background: #f7fafc;
    border-radius: 6px;
}
.config-group label {
    margin-right: 15px;
    font-size: 14px;
}
.config-group input[type="number"],
.config-group input[type="text"] {
    padding: 4px 8px;
    border: 1px solid #ddd;
    border-radius: 4px;
    margin: 0 5px;
    width: 80px;
}
.btn-group {
    margin: 10px 0;
}
.btn-group button {
    padding: 8px 16px;
    border: none;
    border-radius: 4px;
    background: #4299e1;
    color: #fff;
    cursor: pointer;
    margin-right: 10px;
    font-size: 14px;
}
.btn-group button:hover {
    background: #3182ce;
}
.btn-group .danger {
    background: #e53e3e;
}
.btn-group .danger:hover {
    background: #c53030;
}
.unit-btn {
    padding: 4px 8px;
    border: 1px solid #ddd;
    border-radius: 4px;
    cursor: pointer;
    background: #fff;
}
.unit-btn.active {
    background: #4299e1;
    color: #fff;
    border-color: #4299e1;
}
#unit-tip {
    font-size: 12px;
    color: #666;
    margin-left: 10px;
}
/* 进度弹窗样式 */
.progress-modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}
.progress-content {
    background: #fff;
    padding: 20px;
    border-radius: 8px;
    width: 300px;
    text-align: center;
}
.progress-bar {
    width: 100%;
    height: 20px;
    border: 1px solid #ddd;
    border-radius: 10px;
    overflow: hidden;
    margin: 15px 0;
}
.progress-fill {
    height: 100%;
    background: #4299e1;
    width: 0%;
    transition: width 0.2s;
}
</style>
<!-- 引入ExcelJS和FileSaver -->
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.3.0/dist/exceljs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
</head>
<body>

<div class="login" id="login">
  <div class="card">
    <h2>账号登录</h2>
    <input type="text" placeholder="请输入账号" id="user">
    <input type="password" placeholder="请输入密码" id="pwd">
    <button onclick="doLogin()">登录</button>
  </div>
</div>

<div class="main" id="main" style="display:none">
  <div class="sidebar" id="sidebar">
    <div class="title">数据员</div>
    <button class="menu-btn" onclick="openPage('仓储','https://www.kdocs.cn/l/cpbe93n5eBd3')">仓储</button>
    <button class="menu-btn" onclick="openPage('专线','https://www.kdocs.cn/l/cemJcjSGypRD')">专线</button>
    <button class="menu-btn" onclick="openPage('速量','https://www.kdocs.cn/l/clEuM1RGmhai')">速量</button>
    <button class="menu-btn" onclick="openPage('泡比','https://www.kdocs.cn/l/cjZZGlQnBtmm')">泡比</button>
    <button class="menu-btn" onclick="openPage('包数','https://www.kdocs.cn/l/cbJs05zRewYZ')">包数</button>
    <button class="menu-btn" onclick="openPage('单量','https://www.kdocs.cn/l/cdiNjSnC4i2E')">单量</button>
    <button class="menu-btn" onclick="openPage('人效','https://www.kdocs.cn/l/coByacPZqwoP')">人效</button>
    <button class="menu-btn" onclick="openPage('小包','https://www.kdocs.cn/l/cgZfZ6RmT5hJ')">小包</button>
    <button class="menu-btn logout-btn" onclick="doLogout()">退出登录</button>
  </div>
  <div class="toggle-btn" onclick="toggleSidebar()">≡</div>
  <div class="content">
    <div class="tabs" id="tabs"></div>
    <div class="pages" id="pages"></div>
  </div>
</div>

<script>
/**
 * 应用模块
 * 封装所有功能，避免全局变量污染
 */
const App = {
  /**
   * 初始化应用
   */
  init() {
    this.bindEvents();
    this.checkLoginStatus();
  },
  
  /**
   * 绑定事件
   */
  bindEvents() {
    // 侧边栏切换按钮事件
    const toggleBtn = document.querySelector('.toggle-btn');
    if (toggleBtn) {
      toggleBtn.addEventListener('click', () => this.toggleSidebar());
    }
    
    // 登录按钮事件
    const loginBtn = document.querySelector('.login button');
    if (loginBtn) {
      loginBtn.addEventListener('click', () => this.doLogin());
    }
    
    // 回车键登录
    const userInput = document.getElementById('user');
    const pwdInput = document.getElementById('pwd');
    if (userInput && pwdInput) {
      [userInput, pwdInput].forEach(input => {
        input.addEventListener('keyup', (e) => {
          if (e.key === 'Enter') {
            this.doLogin();
          }
        });
      });
    }
  },
  
  /**
   * 登录功能
   * 实现基本的账号密码验证和登录状态管理
   */
  doLogin() {
    try {
      const user = document.getElementById('user').value.trim();
      const pwd = document.getElementById('pwd').value.trim();
      
      // 基本验证
      if (!user) {
        alert('请输入账号');
        return;
      }
      if (!pwd) {
        alert('请输入密码');
        return;
      }
      
      // 这里可以添加更复杂的验证逻辑，比如与后端API交互
      // 这里使用简单的硬编码验证
      if (user === 'admin' && pwd === '123456') {
        document.getElementById('login').style.display = 'none';
        document.getElementById('main').style.display = 'flex';
        // 存储登录状态到本地存储
        localStorage.setItem('isLoggedIn', 'true');
      } else {
        alert('账号或密码错误');
      }
    } catch (error) {
      console.error('登录失败:', error);
      alert('登录过程中发生错误，请重试');
    }
  },

  /**
   * 退出登录功能
   * 清除登录状态并返回登录页面
   */
  doLogout() {
    try {
      if (confirm('确定要退出登录吗？')) {
        document.getElementById('main').style.display = 'none';
        document.getElementById('login').style.display = 'flex';
        document.getElementById('user').value = '';
        document.getElementById('pwd').value = '';
        // 移除本地存储中的登录状态
        localStorage.removeItem('isLoggedIn');
      }
    } catch (error) {
      console.error('退出登录失败:', error);
      alert('退出登录过程中发生错误，请重试');
    }
  },

  /**
   * 侧边栏切换功能
   * 切换侧边栏的展开/折叠状态
   */
  toggleSidebar() {
    try {
      const sidebar = document.getElementById('sidebar');
      if (sidebar) {
        sidebar.classList.toggle('collapse');
      } else {
        console.error('侧边栏元素未找到');
      }
    } catch (error) {
      console.error('切换侧边栏失败:', error);
    }
  },

  /**
   * 打开页面功能
   * @param {string} name - 页面名称
   * @param {string} url - 页面URL
   */
  openPage(name, url) {
    try {
      const tabs = document.getElementById('tabs');
      const pages = document.getElementById('pages');
      
      if (!tabs || !pages) {
        console.error('标签页或页面容器未找到');
        return;
      }
      
      // 检查是否已存在该标签页
      let existingTab = document.querySelector(`.tab[data-name="${name}"]`);
      if (existingTab) {
        // 切换到已存在的标签页
        this.switchTab(name);
        return;
      }
      
      // 创建新标签页
      const tab = document.createElement('div');
      tab.className = 'tab active';
      tab.dataset.name = name;
      tab.innerHTML = `${name} <span class="close">×</span>`;
      tab.onclick = () => this.switchTab(name);
      
      // 添加关闭按钮事件
      const closeBtn = tab.querySelector('.close');
      if (closeBtn) {
        closeBtn.onclick = (e) => {
          e.stopPropagation(); // 阻止事件冒泡
          this.closeTab(name);
        };
      }
      
      tabs.appendChild(tab);
      
      // 创建新页面
      const page = document.createElement('div');
      page.className = 'page active';
      page.dataset.name = name;
      const iframe = document.createElement('iframe');
      iframe.src = url;
      // 添加iframe加载错误处理
      iframe.onerror = function() {
        console.error(`页面 ${name} 加载失败: ${url}`);
      };
      page.appendChild(iframe);
      pages.appendChild(page);
      
      // 移除其他标签页和页面的active类
      document.querySelectorAll('.tab:not([data-name="' + name + '"])').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.page:not([data-name="' + name + '"])').forEach(page => page.classList.remove('active'));
    } catch (error) {
      console.error('打开页面失败:', error);
      alert('打开页面过程中发生错误，请重试');
    }
  },

  /**
   * 切换标签页功能
   * @param {string} name - 页面名称
   */
  switchTab(name) {
    try {
      const tab = document.querySelector(`.tab[data-name="${name}"]`);
      const page = document.querySelector(`.page[data-name="${name}"]`);
      
      if (!tab || !page) {
        console.error('标签页或页面未找到');
        return;
      }
      
      // 移除所有标签页和页面的active类
      document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
      document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
      
      // 添加当前标签页和页面的active类
      tab.classList.add('active');
      page.classList.add('active');
    } catch (error) {
      console.error('切换标签页失败:', error);
    }
  },

  /**
   * 关闭标签页功能
   * @param {string} name - 页面名称
   */
  closeTab(name) {
    try {
      const tab = document.querySelector(`.tab[data-name="${name}"]`);
      const page = document.querySelector(`.page[data-name="${name}"]`);
      
      if (tab && page) {
        const isActive = tab.classList.contains('active');
        tab.remove();
        page.remove();
        
        // 如果关闭的是当前活动标签页，切换到第一个标签页
        if (isActive) {
          const firstTab = document.querySelector('.tab');
          if (firstTab) {
            const firstTabName = firstTab.dataset.name;
            this.switchTab(firstTabName);
          }
        }
      } else {
        console.error('标签页或页面未找到');
      }
    } catch (error) {
      console.error('关闭标签页失败:', error);
    }
  },

  /**
   * 检查登录状态
   */
  checkLoginStatus() {
    try {
      // 检查本地存储中的登录状态
      if (localStorage.getItem('isLoggedIn') === 'true') {
        document.getElementById('login').style.display = 'none';
        document.getElementById('main').style.display = 'flex';
      }
    } catch (error) {
      console.error('检查登录状态失败:', error);
      // 本地存储不可用时，默认显示登录页面
    }
  }
};

// 页面加载完成后初始化应用
window.addEventListener('DOMContentLoaded', () => {
  App.init();
});

// 暴露必要的方法到全局，以便在HTML中调用
window.doLogin = () => App.doLogin();
window.doLogout = () => App.doLogout();
window.openPage = (name, url) => App.openPage(name, url);
</script>
</body>
</html>
